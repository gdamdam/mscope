name: Deploy to GitHub Pages

# Build the Vite app and publish dist/ to GitHub Pages on every push to main.
# Served at https://mscope.mpump.live — the custom domain is held by public/CNAME,
# which Vite copies into dist/ so the artifact-based deploy preserves it.
#
# One-time setup:
#   repo → Settings → Pages → Source: "GitHub Actions"
#   add DNS: CNAME  mscope → <owner>.github.io   (apex/sub per your DNS provider)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - id: deployment
        uses: actions/deploy-pages@v4
